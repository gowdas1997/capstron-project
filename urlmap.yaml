name: capstron-url-map
defaultService: https://www.googleapis.com/compute/v1/projects/sudarshan-kr-project/global/backendBuckets/capstron-frontend-bucket
hostRules:
- hosts:
  - '*'
  pathMatcher: allpaths
pathMatchers:
- name: allpaths
  defaultService: https://www.googleapis.com/compute/v1/projects/sudarshan-kr-project/global/backendBuckets/capstron-frontend-bucket
  pathRules:
  - paths:
    - /api/*
    service: https://www.googleapis.com/compute/v1/projects/sudarshan-kr-project/global/backendServices/capstron-backend