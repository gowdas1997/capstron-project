<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Capstone — Document Upload</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 16px;overflow-x:hidden;position:relative;}
    .bg{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);background-size:400% 400%;animation:gradMove 12s ease infinite;}
    @keyframes gradMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.2;animation:float 8s ease-in-out infinite;z-index:0;}
    .blob1{width:400px;height:400px;background:#4facfe;top:-80px;left:-100px;}
    .blob2{width:350px;height:350px;background:#a855f7;bottom:-60px;right:-80px;animation-delay:3s;}
    .blob3{width:250px;height:250px;background:#00f2fe;top:40%;left:60%;animation-delay:5s;}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-28px)}}
    .grid-bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:60px 60px;}
    .particles{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
    .particle{position:absolute;border-radius:50%;background:rgba(255,255,255,.5);animation:rise linear infinite;}
    @keyframes rise{0%{transform:translateY(100vh);opacity:0}10%{opacity:.6}90%{opacity:.3}100%{transform:translateY(-10vh);opacity:0}}
    .page-wrap{position:relative;z-index:10;width:100%;max-width:620px;display:flex;flex-direction:column;align-items:center;}
    .logo-area{text-align:center;margin-bottom:28px;}
    .logo-area h1{font-size:36px;font-weight:800;color:white;letter-spacing:3px;}
    .logo-area h1 span{background:linear-gradient(90deg,#4facfe,#a855f7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
    .logo-area p{color:rgba(255,255,255,.45);font-size:13px;margin-top:6px;letter-spacing:1px;}
    .card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:36px 40px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,.4);color:white;margin-bottom:20px;}
    .section-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
    .file-type-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
    .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.5px;}
    .badge-doc{background:rgba(79,172,254,.2);color:#4facfe;border:1px solid rgba(79,172,254,.3);}
    .badge-img{background:rgba(52,211,153,.2);color:#34d399;border:1px solid rgba(52,211,153,.3);}
    .badge-aud{background:rgba(251,191,36,.2);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
    .badge-vid{background:rgba(168,85,247,.2);color:#a855f7;border:1px solid rgba(168,85,247,.3);}
    .upload-box{border:2px dashed rgba(79,172,254,.4);border-radius:14px;padding:34px 20px;text-align:center;background:rgba(79,172,254,.05);cursor:pointer;margin-bottom:14px;transition:all .3s;}
    .upload-box:hover{background:rgba(79,172,254,.12);border-color:#4facfe;transform:translateY(-2px);}
    .upload-box .main-text{color:#4facfe;font-size:15px;font-weight:600;margin-top:10px;}
    .upload-box .sub-text{color:rgba(255,255,255,.35);font-size:12px;margin-top:4px;}
    input[type="file"]{display:none;}
    #selected-name{font-size:13px;color:rgba(255,255,255,.55);text-align:center;margin-bottom:14px;padding:8px 14px;background:rgba(255,255,255,.05);border-radius:8px;min-height:36px;display:flex;align-items:center;justify-content:center;gap:6px;}
    .progress-wrap{display:none;margin-bottom:14px;}
    .progress-wrap.show{display:block;}
    .progress-label{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:6px;display:flex;justify-content:space-between;}
    .progress-bar-bg{background:rgba(255,255,255,.1);border-radius:10px;height:8px;overflow:hidden;}
    .progress-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#4facfe,#a855f7);border-radius:10px;transition:width .3s ease;}
    .btn-upload{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#4facfe 0%,#a855f7 100%);color:white;letter-spacing:.5px;transition:all .3s;box-shadow:0 4px 20px rgba(79,172,254,.3);}
    .btn-upload:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(79,172,254,.5);}
    .btn-upload:disabled{background:rgba(255,255,255,.1);color:rgba(255,255,255,.3);cursor:not-allowed;transform:none;box-shadow:none;}
    #status{font-size:13px;padding:10px 16px;border-radius:10px;margin-top:14px;display:none;text-align:center;font-weight:500;}
    .success{background:rgba(52,211,153,.15);color:#34d399;display:block!important;border:1px solid rgba(52,211,153,.3);}
    .error{background:rgba(248,113,113,.15);color:#f87171;display:block!important;border:1px solid rgba(248,113,113,.3);}
    .files-table{width:100%;border-collapse:collapse;margin-top:10px;}
    .files-table th{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.1);text-align:left;}
    .files-table td{padding:10px;font-size:13px;color:rgba(255,255,255,.8);border-bottom:1px solid rgba(255,255,255,.06);}
    .btn-download{padding:5px 12px;border:none;border-radius:8px;background:linear-gradient(135deg,#4facfe,#a855f7);color:white;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;}
    .btn-download:hover{transform:translateY(-1px);opacity:.9;}
    .btn-refresh{padding:5px 12px;border:1px solid rgba(79,172,254,.4);border-radius:8px;background:transparent;color:#4facfe;font-size:11px;cursor:pointer;transition:all .2s;}
    .btn-refresh:hover{background:rgba(79,172,254,.1);}
    .no-files{text-align:center;color:rgba(255,255,255,.3);padding:20px;font-size:13px;}
    .footer{margin-top:24px;color:rgba(255,255,255,.25);font-size:12px;text-align:center;}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="grid-bg"></div>
  <div class="particles" id="particles"></div>
  <div class="page-wrap">
    <div class="logo-area">
      <h1>Cap<span>stone</span></h1>
      <p>Secure Document Management System</p>
    </div>
    <div class="card">
      <div class="section-title">Upload File</div>
      <div class="file-type-badges">
        <span class="badge badge-doc">PDF</span><span class="badge badge-doc">DOCX</span><span class="badge badge-doc">TXT</span><span class="badge badge-doc">XLSX</span><span class="badge badge-img">JPG</span><span class="badge badge-img">PNG</span><span class="badge badge-img">GIF</span><span class="badge badge-aud">MP3</span><span class="badge badge-aud">WAV</span><span class="badge badge-vid">MP4</span><span class="badge badge-vid">MOV</span><span class="badge badge-vid">WEBM</span>
      </div>
      <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#4facfe" stroke-width="1.5" stroke-linecap="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <div class="main-text">Click to select a file</div>
        <div class="sub-text">Documents, Images, Audio, Video — Max 100MB</div>
      </div>
      <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt,.xlsx,.pptx,.jpg,.jpeg,.png,.gif,.webp,.mp3,.wav,.ogg,.m4a,.mp4,.avi,.mov,.mkv,.webm" onchange="onFileSelected(this)"/>
      <div id="selected-name">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
        No file selected
      </div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-label"><span id="progressText">Uploading...</span><span id="progressPct">0%</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
      </div>
      <button class="btn-upload" id="uploadBtn" onclick="uploadFile()" disabled>Upload File</button>
      <div id="status"></div>
    </div>
    <div class="card">
      <div class="section-title">
        <span>Uploaded Files</span>
        <button class="btn-refresh" onclick="loadFiles()">↻ Refresh</button>
      </div>
      <div id="filesList"><div class="no-files">Loading files...</div></div>
    </div>
    <div class="footer">Capstone © 2026 — Powered by GCP</div>
  </div>
<script>
  const API_URL="https://sudarshangowda.online";
  const container=document.getElementById('particles');
  for(let i=0;i<35;i++){const p=document.createElement('div');p.className='particle';const size=(Math.random()*3+1)+'px';p.style.cssText=`left:${Math.random()*100}vw;width:${size};height:${size};animation-duration:${Math.random()*10+8}s;animation-delay:${Math.random()*10}s;opacity:${Math.random()*0.5+0.1};`;container.appendChild(p);}
  async function loadFiles(){
    try{
      const res=await fetch(`${API_URL}/api/files`);
      const data=await res.json();
      const el=document.getElementById('filesList');
      if(!data.length){el.innerHTML='<div class="no-files">No files uploaded yet.</div>';return;}
      el.innerHTML=`<table class="files-table"><thead><tr><th>#</th><th>File Name</th><th>Size</th><th>Type</th><th>Date</th><th>Action</th></tr></thead><tbody>${data.map(f=>`<tr><td>${f.id}</td><td>${f.file_name}</td><td>${formatSize(f.file_size)}</td><td>${f.file_type.toUpperCase()}</td><td>${new Date(f.uploaded_at).toLocaleDateString()}</td><td><button class="btn-download" onclick="downloadFile(${f.id},'${f.file_name}')">↓ Download</button></td></tr>`).join('')}</tbody></table>`;
    }catch(e){document.getElementById('filesList').innerHTML='<div class="no-files">Failed to load files.</div>';}
  }
  async function downloadFile(id,name){
    try{
      const res=await fetch(`${API_URL}/api/files/${id}/download`);
      const data=await res.json();
      if(data.downloadUrl){const a=document.createElement('a');a.href=data.downloadUrl;a.download=name;a.target='_blank';a.click();}
    }catch(e){alert('Download failed!');}
  }
  function onFileSelected(input){
    const file=input.files[0];
    if(file){
      document.getElementById("selected-name").innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4facfe" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg> ${file.name} &nbsp;·&nbsp; ${formatSize(file.size)}`;
      document.getElementById("uploadBtn").disabled=false;
      document.getElementById("status").style.display="none";
    }
  }
  async function uploadFile(){
    const input=document.getElementById("fileInput");
    const file=input.files[0];
    const btn=document.getElementById("uploadBtn");
    if(!file)return;
    btn.disabled=true;
    showProgress(5,"Uploading...");
    try{
      const formData=new FormData();
      formData.append('file',file);
      const xhr=new XMLHttpRequest();
      xhr.upload.onprogress=(e)=>{if(e.lengthComputable){const pct=Math.round((e.loaded/e.total)*90)+5;showProgress(pct,`Uploading... ${formatSize(e.loaded)} / ${formatSize(e.total)}`);}};
      xhr.onload=()=>{
        if(xhr.status===200){
          showProgress(100,"Done!");
          setTimeout(()=>{hideProgress();setStatus("success","✅  File uploaded successfully!");input.value="";document.getElementById("selected-name").innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg> No file selected`;btn.disabled=true;loadFiles();},600);
        }else{hideProgress();setStatus("error","❌  Upload failed: "+xhr.status);btn.disabled=false;}
      };
      xhr.onerror=()=>{hideProgress();setStatus("error","❌  Network error.");btn.disabled=false;};
      xhr.open('POST',`${API_URL}/api/upload`);
      xhr.send(formData);
    }catch(err){hideProgress();setStatus("error","❌  "+(err.message||"Upload failed."));btn.disabled=false;}
  }
  function showProgress(pct,text){document.getElementById("progressWrap").classList.add("show");document.getElementById("progressBar").style.width=pct+"%";document.getElementById("progressPct").textContent=pct+"%";document.getElementById("progressText").textContent=text;document.getElementById("status").style.display="none";}
  function hideProgress(){document.getElementById("progressWrap").classList.remove("show");document.getElementById("progressBar").style.width="0%";}
  function setStatus(type,msg){const el=document.getElementById("status");if(!type){el.style.display="none";return;}el.className=type;el.textContent=msg;}
  function formatSize(bytes){if(!bytes)return"";if(bytes<1024)return bytes+" B";if(bytes<1048576)return(bytes/1024).toFixed(1)+" KB";return(bytes/1048576).toFixed(1)+" MB";}
  loadFiles();
</script>
</body>
</html>
