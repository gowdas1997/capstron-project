name: Deploy Capstone App

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  MIG_NAME: capstone-backend-mig
  FRONTEND_BUCKET: capstone-project-frontend-assets

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # ─────────────────────────────────────────────
    # 1. Checkout code
    # ─────────────────────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v3

    # ─────────────────────────────────────────────
    # 2. Authenticate to GCP
    # ─────────────────────────────────────────────
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    # ─────────────────────────────────────────────
    # 3. Setup gcloud
    # ─────────────────────────────────────────────
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    # ─────────────────────────────────────────────
    # 4. Deploy Frontend
    # ─────────────────────────────────────────────
    - name: Deploy Frontend
      run: |
        echo "=========================================="
        echo "📦 Deploying Frontend to GCS..."
        echo "=========================================="

        gsutil -m rsync -r -d ./frontend gs://$FRONTEND_BUCKET

        echo "🔄 Clearing CDN cache..."
        gcloud compute url-maps invalidate-cdn-cache capstone-lb \
          --path "/*" \
          --project=$PROJECT_ID \
          --async || true

        echo "✅ Frontend deployed successfully!"

    # ─────────────────────────────────────────────
    # 5. Create Startup Script
    # ─────────────────────────────────────────────
    - name: Create startup script
      run: |
        echo "=========================================="
        echo "📝 Creating startup script..."
        echo "=========================================="

        cat > startup-script.sh << 'SCRIPT'
        #!/bin/bash
        set -e

        echo "🚀 New VM starting — deploying latest code..."

        sudo chown -R cloudbuild:cloudbuild /app || true
        git config --global --add safe.directory /app || true

        cd /app
        git reset --hard
        git pull origin main

        cd /app/backend
        npm install --production

        echo "Running DB migration..."
        node migrate.js

        pm2 delete backend || true
        pm2 start server.js --name backend
        pm2 save
        pm2 startup || true

        echo "✅ VM deployment complete!"
        SCRIPT

        echo "✅ Startup script created!"

    # ─────────────────────────────────────────────
    # 6. Get existing Instance Template
    # ─────────────────────────────────────────────
    - name: Get existing Instance Template
      run: |
        echo "=========================================="
        echo "🔍 Getting existing template config..."
        echo "=========================================="

        EXISTING_TEMPLATE=$(gcloud compute instance-groups managed \
          describe $MIG_NAME \
          --region=$REGION \
          --project=$PROJECT_ID \
          --format="value(versions[0].instanceTemplate)")

        echo "EXISTING_TEMPLATE=$EXISTING_TEMPLATE" >> $GITHUB_ENV
        echo "Existing template: $EXISTING_TEMPLATE"

    # ─────────────────────────────────────────────
    # 7. Create NEW Instance Template (FINAL FIX)
    # ─────────────────────────────────────────────
    - name: Create new Instance Template
      run: |
        echo "=========================================="
        echo "📋 Creating new Instance Template..."
        echo "=========================================="

        TEMPLATE_NAME="capstone-template-${{ github.run_number }}"
        echo "TEMPLATE_NAME=$TEMPLATE_NAME" >> $GITHUB_ENV

        TEMPLATE_BASE=$(basename $EXISTING_TEMPLATE)

        echo "Using base template: $TEMPLATE_BASE"

        MACHINE_TYPE=$(gcloud compute instance-templates describe $TEMPLATE_BASE \
          --project=$PROJECT_ID \
          --format="value(properties.machineType)")

        IMAGE=$(gcloud compute instance-templates describe $TEMPLATE_BASE \
          --project=$PROJECT_ID \
          --format="value(properties.disks[0].initializeParams.sourceImage)")

        NETWORK=$(gcloud compute instance-templates describe $TEMPLATE_BASE \
          --project=$PROJECT_ID \
          --format="value(properties.networkInterfaces[0].network)")

        SUBNET=$(gcloud compute instance-templates describe $TEMPLATE_BASE \
          --project=$PROJECT_ID \
          --format="value(properties.networkInterfaces[0].subnetwork)")

        SERVICE_ACCOUNT=$(gcloud compute instance-templates describe $TEMPLATE_BASE \
          --project=$PROJECT_ID \
          --format="value(properties.serviceAccounts[0].email)")

        gcloud compute instance-templates create $TEMPLATE_NAME \
          --machine-type=$MACHINE_TYPE \
          --image=$IMAGE \
          --network=$NETWORK \
          --subnet=$SUBNET \
          --service-account=$SERVICE_ACCOUNT \
          --scopes=https://www.googleapis.com/auth/cloud-platform \
          --metadata-from-file=startup-script=startup-script.sh \
          --project=$PROJECT_ID

        echo "✅ New template created: $TEMPLATE_NAME"

    # ─────────────────────────────────────────────
    # 8. Rolling Update MIG
    # ─────────────────────────────────────────────
    - name: Rolling Update MIG
      run: |
        echo "=========================================="
        echo "🔄 Starting Rolling Update..."
        echo "=========================================="

        gcloud compute instance-groups managed \
          rolling-action start-update $MIG_NAME \
          --project=$PROJECT_ID \
          --region=$REGION \
          --version=template=projects/$PROJECT_ID/global/instanceTemplates/$TEMPLATE_NAME \
          --max-surge=1 \
          --max-unavailable=0

        echo "✅ Rolling update started!"

    # ─────────────────────────────────────────────
    # 9. Wait for update to complete
    # ─────────────────────────────────────────────
    - name: Wait for MIG update
      run: |
        echo "=========================================="
        echo "⏳ Waiting for all VMs to update..."
        echo "=========================================="

        gcloud compute instance-groups managed \
          wait-until $MIG_NAME \
          --version-target-reached \
          --region=$REGION \
          --project=$PROJECT_ID \
          --timeout=300

        echo "✅ All VMs updated successfully!"

    # ─────────────────────────────────────────────
    # 10. Verify deployment
    # ─────────────────────────────────────────────
    - name: Verify deployment
      run: |
        echo "=========================================="
        echo "🔍 Verifying deployment..."
        echo "=========================================="

        echo "--- MIG Status ---"
        gcloud compute instance-groups managed describe $MIG_NAME \
          --region=$REGION \
          --project=$PROJECT_ID \
          --format="table(name,status.isStable)"

        echo "--- Running VMs ---"
        gcloud compute instance-groups managed list-instances $MIG_NAME \
          --region=$REGION \
          --project=$PROJECT_ID \
          --format="table(instance,status,health)"

        echo "--- Frontend Bucket ---"
        gsutil ls gs://$FRONTEND_BUCKET/index.html

        echo "🎉 Deployment Complete!"