name: Deploy Capstone App

on:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  MIG_NAME: capstone-backend-mig
  FRONTEND_BUCKET: capstone-project-frontend-assets
  BACKEND_SA: capstone-backend-sa@sudarshanenhub.iam.gserviceaccount.com
  APP_USER: sudarshandec

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Authenticate to GCP
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    # 3. Setup gcloud
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    # 4. Deploy Frontend
    - name: Deploy Frontend
      run: |
        echo "📦 Deploying Frontend..."

        gsutil -m rsync -r -d ./frontend gs://$FRONTEND_BUCKET

        echo "🔄 Clearing CDN cache..."
        gcloud compute url-maps invalidate-cdn-cache capstone-lb \
          --path "/*" \
          --project=$PROJECT_ID \
          --async || true

        echo "✅ Frontend deployed!"

    # 5. Create Startup Script
    - name: Create startup script
      run: |
        cat > startup-script.sh << 'SCRIPT'
        #!/bin/bash
        set -e
        exec > /var/log/startup-script.log 2>&1

        echo "🚀 Starting deployment..."

        # ── Install dependencies ──
        apt-get update -y
        apt-get install -y git curl

        # ── Install Node.js 18 ──
        curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
        apt-get install -y nodejs

        # ── Install PM2 globally ──
        npm install -g pm2

        # ── Clean old app ──
        rm -rf /app

        # ── Clone latest code ──
        git clone https://github.com/gowdas1997/capstron-project.git /app

        # ── Fix ownership — sudarshandec user ಗೆ ಕೊಡು ──
        chown -R sudarshandec:sudarshandec /app

        cd /app/backend

        # ── Install npm dependencies ──
        npm install

        # ── FIX 1: Secret Manager ನಿಂದ .env fetch ──
        echo "📦 Fetching .env from Secret Manager..."
        gcloud secrets versions access latest \
          --secret="capstone-env" \
          --project=sudarshanenhub > /app/backend/.env

        # .env ownership fix
        chown sudarshandec:sudarshandec /app/backend/.env
        chmod 600 /app/backend/.env

        echo "✅ .env loaded!"

        # ── Add health check if missing ──
        if ! grep -q "/api/health" /app/backend/server.js; then
          echo "Adding health check endpoint..."
          sed -i "1i app.get('/api/health', (req, res) => res.status(200).send('OK'));" /app/backend/server.js
        fi

        # ── Run DB migration ──
        cd /app/backend
        sudo -u sudarshandec node migrate.js || true

        # ── FIX 2: sudarshandec user ಆಗಿ PM2 start ──
        echo "🚀 Starting PM2 as sudarshandec..."
        sudo -u sudarshandec pm2 delete backend || true
        sudo -u sudarshandec bash -c "cd /app/backend && pm2 start server.js --name backend"
        sudo -u sudarshandec pm2 save

        # ── FIX 3: VM restart ಆದರೂ auto-start ──
        echo "⚙️ Setting up PM2 startup for sudarshandec..."
        sudo -u sudarshandec pm2 startup systemd -u sudarshandec --hp /home/sudarshandec | tail -1 | bash || true
        sudo -u sudarshandec pm2 save

        echo "✅ Backend running as sudarshandec!"
        SCRIPT

    # 6. Get existing template
    - name: Get existing Instance Template
      run: |
        EXISTING_TEMPLATE=$(gcloud compute instance-groups managed describe $MIG_NAME \
          --region=$REGION \
          --project=$PROJECT_ID \
          --format="value(versions[0].instanceTemplate)")

        echo "EXISTING_TEMPLATE=$EXISTING_TEMPLATE" >> $GITHUB_ENV

    # 7. Create new Instance Template with Custom SA
    - name: Create new Instance Template
      run: |
        TEMPLATE_NAME="capstone-template-${{ github.run_number }}"
        echo "TEMPLATE_NAME=$TEMPLATE_NAME" >> $GITHUB_ENV

        TEMPLATE_BASE=$(basename $EXISTING_TEMPLATE)

        MACHINE_TYPE=$(gcloud compute instance-templates describe $TEMPLATE_BASE \
          --project=$PROJECT_ID \
          --format="value(properties.machineType)")

        IMAGE=$(gcloud compute instance-templates describe $TEMPLATE_BASE \
          --project=$PROJECT_ID \
          --format="value(properties.disks[0].initializeParams.sourceImage)")

        NETWORK=$(gcloud compute instance-templates describe $TEMPLATE_BASE \
          --project=$PROJECT_ID \
          --format="value(properties.networkInterfaces[0].network)")

        SUBNET=$(gcloud compute instance-templates describe $TEMPLATE_BASE \
          --project=$PROJECT_ID \
          --format="value(properties.networkInterfaces[0].subnetwork)")

        # ── FIX 4: Custom SA ಬಳಸಿ ──
        gcloud compute instance-templates create $TEMPLATE_NAME \
          --machine-type=$MACHINE_TYPE \
          --image=$IMAGE \
          --network=$NETWORK \
          --subnet=$SUBNET \
          --no-address \
          --tags=backend \
          --service-account=$BACKEND_SA \
          --scopes=https://www.googleapis.com/auth/cloud-platform \
          --metadata-from-file=startup-script=startup-script.sh \
          --project=$PROJECT_ID

        echo "✅ Template created with capstone-backend-sa!"

    # 8. Rolling Update MIG
    - name: Rolling Update MIG
      run: |
        gcloud compute instance-groups managed rolling-action start-update $MIG_NAME \
          --project=$PROJECT_ID \
          --region=$REGION \
          --version=template=projects/$PROJECT_ID/global/instanceTemplates/$TEMPLATE_NAME \
          --max-surge=3 \
          --max-unavailable=0

        echo "🚀 Rolling update started"

    # 9. Wait for update
    - name: Wait for MIG update
      run: |
        gcloud compute instance-groups managed wait-until $MIG_NAME \
          --version-target-reached \
          --region=$REGION \
          --project=$PROJECT_ID \
          --timeout=600 || true

    # 10. Verify deployment
    - name: Verify deployment
      run: |
        gcloud compute instance-groups managed describe $MIG_NAME \
          --region=$REGION \
          --project=$PROJECT_ID \
          --format="table(name,status.isStable)"

        gcloud compute instance-groups managed list-instances $MIG_NAME \
          --region=$REGION \
          --project=$PROJECT_ID \
          --format="table(instance,status,health)"

        echo "🎉 Deployment Complete!"