name: Deploy Capstone App

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  MIG_NAME: capstone-backend-mig
  FRONTEND_BUCKET: capstone-project-frontend-assets
  MACHINE_TYPE: e2-medium
  IMAGE_FAMILY: debian-11
  IMAGE_PROJECT: debian-cloud
  NETWORK: capstone-vpc
  SUBNET: capstone-subnet-backend
  SERVICE_ACCOUNT: default

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # ─────────────────────────────────────────────
    # 1. Checkout Code
    # ─────────────────────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v3

    # ─────────────────────────────────────────────
    # 2. Authenticate to GCP
    # ─────────────────────────────────────────────
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    # ─────────────────────────────────────────────
    # 3. Setup gcloud
    # ─────────────────────────────────────────────
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    # ─────────────────────────────────────────────
    # 4. Create Startup Script (MAIN LOGIC)
    # ─────────────────────────────────────────────
    - name: Create startup script
      run: |
        cat << 'EOF' > startup-script.sh
        #!/bin/bash

        echo "🚀 Starting deployment..."

        # Install dependencies
        apt-get update -y
        apt-get install -y git curl

        # Install Node.js
        curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
        apt-get install -y nodejs

        # Install PM2
        npm install -g pm2

        # Clean old app
        rm -rf /app

        # Clone latest code
        git clone https://github.com/gowdas1997/capstron-project.git /app

        cd /app/backend

        # Install dependencies
        npm install

        # Run migration
        node migrate.js || true

        # Start backend
        pm2 delete backend || true
        pm2 start server.js --name backend
        pm2 save

        echo "✅ Backend deployed successfully"
        EOF

    # ─────────────────────────────────────────────
    # 5. Create NEW Instance Template (FIXED)
    # ─────────────────────────────────────────────
    - name: Create Instance Template
      run: |
        TEMPLATE_NAME="capstone-template-$(date +%s)"
        echo "TEMPLATE_NAME=$TEMPLATE_NAME" >> $GITHUB_ENV

        gcloud compute instance-templates create $TEMPLATE_NAME \
          --project=$PROJECT_ID \
          --machine-type=$MACHINE_TYPE \
          --image-family=$IMAGE_FAMILY \
          --image-project=$IMAGE_PROJECT \
          --network=$NETWORK \
          --subnet=$SUBNET \
          --no-address \
          --tags=backend \
          --service-account=$SERVICE_ACCOUNT \
          --scopes=https://www.googleapis.com/auth/cloud-platform \
          --metadata-from-file=startup-script=startup-script.sh

        echo "✅ Template Created"

    # ─────────────────────────────────────────────
    # 6. Update MIG
    # ─────────────────────────────────────────────
    - name: Update Managed Instance Group
      run: |
        gcloud compute instance-groups managed set-instance-template $MIG_NAME \
          --template=$TEMPLATE_NAME \
          --region=$REGION \
          --project=$PROJECT_ID

        gcloud compute instance-groups managed rolling-action replace $MIG_NAME \
          --region=$REGION \
          --project=$PROJECT_ID

        echo "✅ MIG Updated"

    # ─────────────────────────────────────────────
    # 7. Deploy Frontend to GCS
    # ─────────────────────────────────────────────
    - name: Deploy Frontend
      run: |
        gsutil -m rsync -r -d ./frontend gs://$FRONTEND_BUCKET

        echo "✅ Frontend deployed"

    # ─────────────────────────────────────────────
    # 8. Invalidate CDN Cache (OPTIONAL)
    # ─────────────────────────────────────────────
    - name: Clear CDN Cache
      continue-on-error: true
      run: |
        gcloud compute url-maps invalidate-cdn-cache capstone-lb \
          --path "/*" \
          --project=$PROJECT_ID || true

        echo "✅ CDN Cache Cleared (if permission available)"