name: Deploy Capstone App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Authenticate to GCP
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    # 3. Setup gcloud
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    # 4. Deploy Backend (FINAL FIXED)
    - name: Deploy Backend
      run: |
        gcloud compute ssh cloudbuild@capstone-backend-mig-4rd7 \
          --zone=asia-south1-b \
          --tunnel-through-iap \
          --command="
            git config --global --add safe.directory /app &&
            cd /app/backend &&
            git pull &&
            npm install &&
            node migrate.js || true &&
            pm2 delete all || true &&
            pm2 start server.js --name backend &&
            pm2 save
          "

    # 5. Deploy Frontend to GCS
    - name: Deploy Frontend
      run: |
        gsutil -m rsync -r -d ./frontend gs://capstone-project-frontend-assets