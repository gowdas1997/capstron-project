name: Deploy Capstone App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Authenticate to GCP
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    # 3. Setup gcloud
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    # 4. Deploy Backend
    - name: Deploy Backend
      run: |
        gcloud compute ssh cloudbuild@capstone-backend-mig-4rd7 \
          --zone=asia-south1-b \
          --tunnel-through-iap \
          --command="
            set -e

            echo 'Fixing permissions...'
            sudo chown -R cloudbuild:cloudbuild /app || true

            echo 'Fixing git safe directory...'
            git config --global --add safe.directory /app || true

            echo 'Navigating to backend...'
            cd /app/backend

            echo 'Pulling latest code...'
            git pull

            echo 'Installing dependencies...'
            npm install

            echo 'Loading ENV...'
            export \$(grep -v '^#' .env | xargs) || true

            echo 'Running migration (optional)...'
            node migrate.js || true

            echo 'Restarting backend...'
            pm2 restart backend || pm2 start server.js --name backend

            echo 'Saving PM2...'
            pm2 save

            echo 'Backend deployed successfully ✅'
          "

    # 5. Deploy Frontend
    - name: Deploy Frontend
      run: |
        echo "Deploying frontend to GCS..."
        gsutil -m rsync -r -d ./frontend gs://capstone-project-frontend-assets

        echo "Frontend deployed successfully ✅"